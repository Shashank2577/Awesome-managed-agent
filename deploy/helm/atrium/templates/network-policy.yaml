# Network policies for Atrium
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "atrium.fullname" . }}-api-policy
  namespace: {{ .Release.Namespace }}
spec:
  podSelector:
    matchLabels:
      app: atrium-api
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector: {} # Allow ingress controller
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.sandbox.namespace }}
      # Allow calls to sandbox API if needed
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # External egress allowed via default or specific rules
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "atrium.fullname" . }}-webhook-worker-policy
  namespace: {{ .Release.Namespace }}
spec:
  podSelector:
    matchLabels:
      app: atrium-webhook-worker
  policyTypes:
    - Egress
    - Ingress
  ingress: [] # Webhook worker receives no incoming traffic
  egress:
    - ports:
        - port: 443
          protocol: TCP
        - port: 80
          protocol: TCP
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: atrium-sandbox-policy
  namespace: {{ .Values.sandbox.namespace }}
spec:
  podSelector:
    matchLabels:
      app: atrium-sandbox
  policyTypes:
    - Egress
    - Ingress
  ingress: []
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Release.Namespace }}
          podSelector:
            matchLabels:
              app: atrium-api
      ports:
        - port: 80
          protocol: TCP
    - ports:
        - port: 443
          protocol: TCP
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
