version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8080:8080"
    environment:
      ATRIUM_DEV_MODE: "true"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"        # primary — powers direct_gemini runtime
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"  # optional — powers direct_anthropic runtime
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"         # optional — powers open_agent_sdk runtime
      GEMINI_MODEL: "${GEMINI_MODEL:-gemini-2.5-flash}"
    volumes:
      - atrium_data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/api/v1/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s
    restart: unless-stopped

volumes:
  atrium_data:
